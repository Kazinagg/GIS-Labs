    <h2><a id="mozTocId218371" class="mozTocH2" />Information:</h2>
    <dl>
      <dt>Description:</dt>
        <dd>Mine provided by Alexandra Newman</dd>
      <dt>Block model:</dt>
        <dd>1060 blocks of unknown size</dd>
        <dd>precedence computed using 5 blocks above (+)</dd>
      <dt>Blockfile columns detail:</dt>
        <dd>id x y z type grade tonns min_caf value_extracc value_proc
          apriori_process</dd>
      <dt>Blockvalue computation</dt>
        <dd>Extraction cost = tonns * min_caf * 1</dd>
        <dd>Process benefit: (19.29 * Recovery * Grade - Process_cost) * tonns</dd>
        <dd>Process cost = 8.195 (if Type=OXOR), 16.862 (if Type=FRWS or FROR)</dd>
        <dd>Discount rate = 0.08</dd>
      <dt>Type of Constraints:</dt>
        <dd>C0 Capacity constraint (mine): Total extracted tonnage min = 1400000
          max = 2000000</dd>
        <dd>C1 Capacity constraint (process): Total processed tonnage min =
          900000 max = 1100000</dd>
    </dl>
